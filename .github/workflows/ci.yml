name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Smoke CLI
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          mkdir -p "${workdir}/in"
          printf 'hello\n' > "${workdir}/in/a.txt"

          cargo run -q -p k7z-cli -- pack "${workdir}/in/a.txt" -o "${workdir}/a.zip"
          cargo run -q -p k7z-cli -- test "${workdir}/a.zip"
          cargo run -q -p k7z-cli -- unpack "${workdir}/a.zip" -o "${workdir}/out"

          cargo run -q -p k7z-cli -- pack "${workdir}/in/a.txt" -o "${workdir}/a.7z" -p secret --solid
          cargo run -q -p k7z-cli -- test "${workdir}/a.7z" -p secret

          cargo run -q -p k7z-cli -- bench "${workdir}/in/a.txt" -f zip -n 2 --json > "${workdir}/bench.json"
