name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Smoke CLI
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          mkdir -p "${workdir}/in"
          printf 'hello\n' > "${workdir}/in/a.txt"

          cargo run -q -p k7z-cli -- pack "${workdir}/in/a.txt" -o "${workdir}/a.zip"
          cargo run -q -p k7z-cli -- test "${workdir}/a.zip"
          cargo run -q -p k7z-cli -- unpack "${workdir}/a.zip" -o "${workdir}/out"

          cargo run -q -p k7z-cli -- pack "${workdir}/in/a.txt" -o "${workdir}/a.7z" -p secret --solid
          cargo run -q -p k7z-cli -- test "${workdir}/a.7z" -p secret

          cargo run -q -p k7z-cli -- bench "${workdir}/in/a.txt" -f zip -n 2 --json > "${workdir}/bench.json"
          cargo run -q -p k7z-cli -- bench "${workdir}/in/a.txt" -f zip --warmup 1 -n 2 --out "${workdir}/bench-out.json"
          cargo run -q -p k7z-cli -- bench "${workdir}/in/a.txt" -f zip --warmup 1 -n 2 --jsonl "${workdir}/bench.jsonl"
          cargo run -q -p k7z-cli -- bench "${workdir}/in/a.txt" -f zip --warmup 1 -n 2 --csv "${workdir}/bench.csv"

          test -s "${workdir}/bench.json"
          test -s "${workdir}/bench-out.json"
          test -s "${workdir}/bench.jsonl"
          test -s "${workdir}/bench.csv"
          grep -q '"format": "Zip"' "${workdir}/bench-out.json"
          grep -q '"iterations": 2' "${workdir}/bench-out.json"
          grep -q '"warmup_iterations": 1' "${workdir}/bench-out.json"
          grep -q '"format":"zip"' "${workdir}/bench.jsonl"
          grep -q '^timestamp_unix_ms,format' "${workdir}/bench.csv"

  compat-corpus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install system archive tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends p7zip-full zip unzip zstd tar

      - name: Run compatibility corpus
        run: ./scripts/compat-corpus.sh
