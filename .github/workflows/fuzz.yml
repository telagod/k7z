name: Fuzz

on:
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Per-target fuzz duration in seconds for manual runs"
        required: false
        default: "60"
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - safe_join
          - detect_format
          - zip_list
          - tar_list
          - zstd_list
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Resolve fuzz duration
        id: cfg
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            max_total_time="300"
          else
            max_total_time="${{ github.event.inputs.max_total_time }}"
          fi

          if [ -z "${max_total_time}" ]; then
            max_total_time="60"
          fi

          echo "max_total_time=${max_total_time}" >> "${GITHUB_OUTPUT}"

      - name: Run fuzz target
        run: |
          cd fuzz
          cargo +nightly fuzz run "${{ matrix.target }}" -- -max_total_time=${{ steps.cfg.outputs.max_total_time }}

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: fuzz/artifacts/${{ matrix.target }}
          if-no-files-found: ignore
          retention-days: 14
