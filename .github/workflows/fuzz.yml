name: Fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - safe_join
          - detect_format
          - zip_list
          - tar_list
          - zstd_list
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz target (smoke)
        if: github.event_name == 'workflow_dispatch'
        run: |
          cd fuzz
          cargo +nightly fuzz run "${{ matrix.target }}" -- -max_total_time=60

      - name: Run fuzz target (nightly)
        if: github.event_name == 'schedule'
        run: |
          cd fuzz
          cargo +nightly fuzz run "${{ matrix.target }}" -- -max_total_time=300

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: fuzz/artifacts/${{ matrix.target }}
          if-no-files-found: ignore
          retention-days: 14
